<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Consent Manager — Manual Test</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333;">

  <div style="max-width:800px;margin:0 auto;padding:24px 16px;">

    <h1 style="margin:0 0 8px;font-size:22px;">Cookie Consent Manager — Test Page</h1>
    <p style="margin:0 0 20px;font-size:14px;color:#666;">Manual testing harness. Open the browser console for additional output.</p>

    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;">
      <button onclick="testGetPreferences()" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Get Preferences</button>
      <button onclick="testSetLanguage('en')" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Set Language (en)</button>
      <button onclick="testSetLanguage('tr')" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Set Language (tr)</button>
      <button onclick="testReset()" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Reset</button>
      <button onclick="testDestroy()" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Destroy</button>
      <button onclick="testReinit()" style="padding:8px 14px;border:1px solid #ccc;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;">Re-init</button>
      <button onclick="testCorruptCookie()" style="padding:8px 14px;border:1px solid #c00;border-radius:6px;background:#fff;cursor:pointer;font-size:13px;color:#c00;">Corrupt Cookie Test</button>
    </div>

    <div style="background:#1e1e1e;border-radius:8px;padding:14px 16px;min-height:300px;max-height:600px;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="color:#9cdcfe;font-size:13px;font-weight:600;">Event Log</span>
        <button onclick="clearLog()" style="padding:4px 10px;border:1px solid #444;border-radius:4px;background:#2d2d2d;color:#ccc;cursor:pointer;font-size:12px;">Clear</button>
      </div>
      <div id="log" style="font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-size:12px;line-height:1.7;color:#d4d4d4;white-space:pre-wrap;word-break:break-all;"></div>
    </div>

  </div>

  <script src="./dist/cookie-consent-manager.umd.js"></script>
  <script>
    var logEl = document.getElementById('log');

    function log(name, data) {
      var ts = new Date().toLocaleTimeString();
      var entry = document.createElement('div');
      var label = document.createElement('span');
      label.style.color = '#4ec9b0';
      label.textContent = '[' + ts + '] ' + name;
      entry.appendChild(label);
      if (data !== undefined) {
        entry.appendChild(document.createTextNode('\n' + JSON.stringify(data, null, 2)));
      }
      entry.appendChild(document.createTextNode('\n'));
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
      console.log('[' + ts + '] ' + name, data);
    }

    function clearLog() {
      logEl.innerHTML = '';
    }

    function getConfig() {
      return {
        language: 'tr',
        categories: [
          {
            id: 'required',
            required: true,
            title: 'Gerekli Çerezler',
            description: 'Bu çerezler web sitesinin temel işlevleri için gereklidir ve devre dışı bırakılamaz.',
            cookies: [
              { name: 'XSRF-TOKEN', provider: 'Test Site', description: 'CSRF koruması', purpose: 'Güvenlik', expiry: 'Oturum', party: 'first' },
              { name: 'laravel_session', provider: 'Test Site', description: 'Oturum yönetimi', purpose: 'Oturum', expiry: 'Oturum', party: 'first' }
            ]
          },
          {
            id: 'analytics',
            title: 'Analitik Çerezler',
            description: 'Bu çerezler, web sitemizin nasıl kullanıldığını anlamamıza yardımcı olur.',
            cookies: [
              { name: '_ga', provider: 'Google Analytics', purpose: 'Ziyaretçi analizi', expiry: '2 yıl', party: 'third' },
              { name: '_ga_ABC123', provider: 'Google Analytics', purpose: 'Oturum analizi', expiry: '2 yıl', party: 'third' }
            ]
          },
          {
            id: 'marketing',
            title: 'Pazarlama Çerezleri',
            description: 'Bu çerezler pazarlama amaçlı kullanılır.',
            cookies: [
              { name: '_fbp', provider: 'Meta', purpose: 'Reklam', expiry: '3 ay', party: 'third' }
            ]
          }
        ],
        theme: { primaryColor: '#FF671D' },
        policyUrl: 'https://example.com/policy.pdf',
        onReady: function (payload) { log('onReady', payload); },
        onSave: function (payload) { log('onSave', payload); },
        onAccept: function (payload) { log('onAccept', payload); },
        onReject: function (payload) { log('onReject', payload); },
        onChange: function (payload) { log('onChange', payload); }
      };
    }

    function testGetPreferences() {
      var prefs = CookieConsentManager.getPreferences();
      log('getPreferences()', prefs);
    }

    function testSetLanguage(lang) {
      log('setLanguage("' + lang + '")');
      CookieConsentManager.setLanguage(lang);
    }

    function testReset() {
      log('reset()');
      CookieConsentManager.reset();
    }

    function testDestroy() {
      log('destroy()');
      CookieConsentManager.destroy();
    }

    function testReinit() {
      log('re-init');
      CookieConsentManager.init(getConfig());
    }

    function testCorruptCookie() {
      log('corrupt cookie test');
      CookieConsentManager.destroy();
      document.cookie = 'ccm_preferences=not-json-at-all; path=/';
      document.cookie = 'ccm_decision=accepted_all; path=/';
      log('cookies set (corrupt preferences)', document.cookie);
      CookieConsentManager.init(getConfig());
    }

    CookieConsentManager.init(getConfig());
  </script>
</body>
</html>
